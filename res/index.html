<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Lease Information</title>
        <style type="text/css">
            body {
                margin: 40px auto;
                max-width: 600px;
                line-height: 1.6;
                font-size: 18;
                padding: 0 10px;
            }

            h1, h2, h3 {
                line-height: 1.3;
            }

            .link {
                margin-left: 5px;
                margin-right: 5px;
            }
        </style>
    </head>
    <body>
        <h1>Lease Information</h1>

        <p><b>IP:</b> {{address}}</p>

        <p><b>Remaining lease time:</b> <span id="remaining-text">{{remaining}}</span></p>
        <p>
            <a href="#" class="link" id="renew">[Renew lease]</a>
            <a href="revoke" class="link">[Revoke lease]</a>
        </p>
    </body>
    <script type="text/javascript">
        let lease;
        let lock = false;
        let timer;

        function formatDuration(sec) {
            if(sec < 60)
                return `${sec}s`;
            const m = Math.floor(sec/60);
            if(m < 60)
                return `${m}m`;
            else if(m < 60 * 24)
                return `${Math.floor(m/60)}h${m%60}m`;
            else
                return `${Math.floor(m/(60*24))}d${Math.floor((m%(60*24))/60)}h${m%60}m`;
        }

        async function fetchLease() {
            try {
                const response = await fetch("lease");
                if (response.ok) {
                    const data = await response.json();
                    return data.lease;
                } else {
                    console.error(response);
                }
            } catch (e) {
            }
            return null;
        }

        async function updateLease() {
            if (lock) {
                return;
            }

            try {
                lock = true;
                if (lease == null) {
                    lease = await fetchLease();
                } else {
                    lease--;
                }

                let text;
                if (lease == null || lease <= 0) {
                    clearInterval(timer);
                    window.location.reload();
                } else {
                    text = formatDuration(lease);
                }
                document.getElementById("remaining-text").innerText = text;
            } finally {
                lock = false;
            }
        }

        async function onRenew() {
            const ret = await fetch("renew", {
                method: "POST",
                cache: "no-cache",
                redirect: "manual",
            });

            if (!ret.ok && ret.status != 302 && ret.status != 303) {
                console.error(ret);
            }

            updateLease();
        }

        document.getElementById("renew").addEventListener("click", onRenew);
        timer = setInterval(updateLease, 1000);
    </script>
</html>
