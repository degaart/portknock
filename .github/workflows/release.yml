name: Release

on:
  push:
    tags:
      - 'v*'   # triggers on version tags like v1.0.0

jobs:
  build:
    runs-on: ubuntu-latest
    container: debian:buster

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build
        run: bash .github/build.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: |
            target/release/portknock
          retention-days: 1

  release:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: binaries
          path: target/artifacts

      - name: Create tarball
        run: |
          mkdir target/portknock-${{ github.ref_name }}
          cp target/artifacts/* target/portknock-${{ github.ref_name }}/
          chmod +x target/portknock-${{ github.ref_name }}/portknock
          cp config.cfg.template portknock.service target/portknock-${{ github.ref_name }}/
          tar Jcvf target/portknock-${{ github.ref_name }}.tar.xz target/portknock-${{ github.ref_name }}

      - name: Create release
        run: |
          gh release create ${{ github.ref_name }} target/portknock-${{ github.ref_name }}.tar.xz \
            --title "Release ${{ github.ref_name }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

