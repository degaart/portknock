name: Release

on:
  push:
    tags:
      - 'v*'   # triggers on version tags like v1.0.0

jobs:
  build:
    runs-on: ubuntu-latest
    container: debian:buster

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build
        run: bash .github/build.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: |
            target/release/portknock
          retention-days: 1

  release:
      runs-on: ubuntu-latest
      needs: build
      permissions:
        contents: write

      steps:
        - name: Download artifact
          uses: actions/download-artifact@v4
          with:
            name: binaries
            path: ./portknock.zip
        - name: Install github cli
          run: |
            mkdir -pv /etc/apt/keyrings
            curl -fL -o /etc/apt/keyrings/githubcli-archive-keyring.gpg "https://cli.github.com/packages/githubcli-archive-keyring.gpg"
            echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" > /etc/apt/sources.list.d/github-cli.list
            apt-get update
            apt-get install -qy gh
        - name: Create release
          run: |
            gh release create ${{ github.ref_name }} ./portknock.zip \
              --title "Release ${{ github.ref_name }}" \
              --notes "Automated release"
          env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


