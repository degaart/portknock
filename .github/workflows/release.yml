name: Release

on:
  push:
    tags:
      - 'v*'   # triggers on version tags like v1.0.0

jobs:
  build:
    runs-on: ubuntu-latest
    container: debian:buster

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build
        run: bash .github/build.sh

      - name: Install github cli
        run: |
          mkdir -pv /etc/apt/keyrings
          curl -fL -o /etc/apt/keyrings/githubcli-archive-keyring.gpg "https://cli.github.com/packages/githubcli-archive-keyring.gpg"
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" > /etc/apt/sources.list.d/github-cli.list
          apt-get update
          apt-get install -qy gh

      - name: Create release
        run: |
          tar Jcvf target/portknock.tar.xz -C target/release portknock
          gh release create ${{ github.ref_name }} target/portknock.tar.xz \
            --title "Release ${{ github.ref_name }}" \
            --notes "Automated release"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

