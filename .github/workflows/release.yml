name: Release

on:
  push:
    tags:
      - 'v*'   # triggers on version tags like v1.0.0

jobs:
  build:
    runs-on: ubuntu-latest
    container: debian:buster

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build
        run: bash .github/build.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: |
            target/release/portknock
          retention-days: 1

  release:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: binaries
          path: target/binaries.zip

      - name: Create release
        run: |
          gh release create ${{ github.ref_name }} target/binaries.zip \
            --title "Release ${{ github.ref_name }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

